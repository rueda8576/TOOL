services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: doctoral_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /var/lib/atlasium/storage
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    volumes:
      - ${ATLASIUM_STORAGE_HOST_PATH:-./storage}:/var/lib/atlasium/storage

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /var/lib/atlasium/storage
    depends_on:
      - postgres
      - redis
    volumes:
      - ${ATLASIUM_STORAGE_HOST_PATH:-./storage}:/var/lib/atlasium/storage

volumes:
  postgres_data:
