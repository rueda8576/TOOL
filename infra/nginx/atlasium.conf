server {
  listen 80;
  server_name atlasium.info www.atlasium.info;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://atlasium.info$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name www.atlasium.info;

  ssl_certificate /etc/letsencrypt/live/atlasium.info/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/atlasium.info/privkey.pem;

  return 301 https://atlasium.info$request_uri;
}

server {
  listen 443 ssl http2;
  server_name atlasium.info;

  ssl_certificate /etc/letsencrypt/live/atlasium.info/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/atlasium.info/privkey.pem;

  client_max_body_size 1024m;

  location /api/ {
    proxy_pass http://127.0.0.1:4000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
