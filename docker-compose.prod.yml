services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: doctoral_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctoral_platform"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  mailpit:
    image: axllent/mailpit:latest

  api:
    image: ghcr.io/rueda8576/atlasium-api:${IMAGE_TAG:-main}
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /var/lib/atlasium/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "4000:4000"
    volumes:
      - ${ATLASIUM_STORAGE_HOST_PATH:-/var/lib/atlasium/storage}:/var/lib/atlasium/storage

  migrate:
    image: ghcr.io/rueda8576/atlasium-api:${IMAGE_TAG:-main}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -lc
      - >
        PRISMA_CLI="$(find /app/node_modules/.pnpm -path '*/node_modules/prisma/build/index.js' | head -n 1)";
        test -n "$PRISMA_CLI";
        node "$PRISMA_CLI" migrate deploy --schema packages/db/prisma/schema.prisma
    restart: "no"

  web:
    image: ghcr.io/rueda8576/atlasium-web:${IMAGE_TAG:-main}
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"

  worker:
    image: ghcr.io/rueda8576/atlasium-worker:${IMAGE_TAG:-main}
    env_file:
      - .env
    environment:
      STORAGE_ROOT: /var/lib/atlasium/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ${ATLASIUM_STORAGE_HOST_PATH:-/var/lib/atlasium/storage}:/var/lib/atlasium/storage

volumes:
  postgres_data:
